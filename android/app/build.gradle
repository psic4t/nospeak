apply plugin: 'com.android.application'

import groovy.json.JsonSlurper

def packageJsonFile = rootProject.file('../package.json')
def packageJson = null

def packageVersion = '0.0.0'
if (packageJsonFile.exists()) {
    try {
        packageJson = new JsonSlurper().parseText(packageJsonFile.getText('UTF-8'))
        if (packageJson?.version) {
            packageVersion = packageJson.version
        } else {
            println "[nospeak-android] package.json missing version; defaulting to ${packageVersion}"
        }
    } catch (Exception e) {
        println "[nospeak-android] Failed to parse package.json: ${e.message}; defaulting to ${packageVersion}"
    }
} else {
    println "[nospeak-android] package.json not found at ${packageJsonFile}; defaulting to ${packageVersion}"
}

def sanitizedSemver = packageVersion.split(/[\-\+]/)[0]
def semverParts = sanitizedSemver.tokenize('.')

def nospeakVersionCode = packageJson?.versionCode ?: 1
def nospeakVersionName = "v${packageVersion}"

// Compile-time mirror of `src/lib/core/runtimeConfig/defaults.ts`
// iceServers array, exposed as BuildConfig.DEFAULT_ICE_SERVERS_JSON.
// The FGS uses this as the final fallback when neither the JS-supplied
// intent extra nor the SharedPreferences snapshot is available
// (typical cold-start path before the user has ever made a call from
// the JS layer).
//
// Drift between this resource and defaults.ts is detected by the JS
// test `src/lib/core/runtimeConfig/defaultsAndroidDrift.test.ts`.
//
// Part of fix-android-ice-servers-from-runtime-config.
def defaultIceServersFile = file('src/main/res/raw/default_ice_servers.json')
if (!defaultIceServersFile.exists()) {
    throw new GradleException(
        "[nospeak-android] required resource missing: ${defaultIceServersFile}. " +
        "This file is the compile-time mirror of src/lib/core/runtimeConfig/defaults.ts " +
        "iceServers and must be present for BuildConfig.DEFAULT_ICE_SERVERS_JSON.")
}
def defaultIceServersJson = defaultIceServersFile.getText('UTF-8').trim()
if (defaultIceServersJson.isEmpty()) {
    throw new GradleException(
        "[nospeak-android] ${defaultIceServersFile} is empty. " +
        "It must contain a JSON array of RTCIceServer entries.")
}

android {
    namespace = "com.nospeak.app"
    compileSdk = rootProject.ext.compileSdkVersion
    buildFeatures {
        // Required for BuildConfig.DEFAULT_ICE_SERVERS_JSON (used by
        // VoiceCallForegroundService.ensureNativeManager as the final
        // fallback iceServers list).
        buildConfig = true
    }
    defaultConfig {
        applicationId = "com.nospeak.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode = nospeakVersionCode
        versionName = nospeakVersionName
        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
        // Inject the JSON as a String. Groovy double-quoted string
        // would interpolate; we deliberately do not interpolate any
        // user-controlled values, so this is safe. Escape embedded
        // double-quotes by replacing with \".
        def escapedIceServersJson = defaultIceServersJson.replace('\\', '\\\\').replace('"', '\\"')
        buildConfigField "String", "DEFAULT_ICE_SERVERS_JSON",
            "\"${escapedIceServersJson}\""
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        create("release") {
            def storeFilePath = project.findProperty("RELEASE_STORE_FILE") ?: System.getenv("RELEASE_STORE_FILE")
            def storePasswordValue = project.findProperty("RELEASE_STORE_PASSWORD") ?: System.getenv("RELEASE_STORE_PASSWORD")
            def keyAliasValue = project.findProperty("RELEASE_KEY_ALIAS") ?: System.getenv("RELEASE_KEY_ALIAS")
            def keyPasswordValue = project.findProperty("RELEASE_KEY_PASSWORD") ?: System.getenv("RELEASE_KEY_PASSWORD")

            if (storeFilePath && storePasswordValue && keyAliasValue && keyPasswordValue) {
                storeFile file(storeFilePath)
                storePassword storePasswordValue
                keyAlias keyAliasValue
                keyPassword keyPasswordValue
            } else {
                println "[nospeak-android] Release signing config not fully defined; release build will be unsigned."
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled = false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'

            def releaseSigningConfig = signingConfigs.findByName("release")
            if (releaseSigningConfig != null && releaseSigningConfig.storeFile != null) {
                signingConfig = releaseSigningConfig
            }
        }
    }

    testOptions {
        unitTests {
            // Return Android framework defaults (e.g. android.util.Log
            // methods return 0 instead of throwing RuntimeException)
            // for unit tests. Required by IceServersJsonParserTest
            // because the parser uses Log.w on every malformed-input
            // branch and we want the malformed-input branches to be
            // covered, not skipped.
            returnDefaultValues = true
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.core:core:$androidxCoreVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
     implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
     // Required for Direct Share targets via ShortcutManagerCompat
     implementation "androidx.sharetarget:sharetarget:1.2.0"
      implementation project(':capacitor-android')
      implementation "com.squareup.okhttp3:okhttp:4.12.0"
      implementation "androidx.security:security-crypto:1.1.0"
      implementation "org.bouncycastle:bcprov-jdk15to18:1.78.1"
      // WebRTC peer connection for native voice calling (Phase 0 plumbing for add-native-voice-calls).
      // Drop-in replacement for the deprecated org.webrtc:google-webrtc; same org.webrtc.* package layout.
      implementation "io.getstream:stream-webrtc-android:1.3.8"
      // LocalBroadcastManager: used by the native call manager to receive the
      // nospeak.ACTION_UNLOCK_COMPLETE broadcast from the JS unlock screen
      // (Phase 2 of add-native-voice-calls).
      implementation "androidx.localbroadcastmanager:localbroadcastmanager:1.1.0"
      testImplementation "junit:junit:$junitVersion"
     testImplementation "org.json:json:20240303"

    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'
